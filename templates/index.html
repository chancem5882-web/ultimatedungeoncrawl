<!DOCTYPE html>
<html>
<head>
    <title>DCC MMO Hub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">DUNGEON CRAWLER MMO HUB</div>

<div class="main">

<div class="card">

<h2>Create Character</h2>

<form action="/create" method="POST">

<input name="name" placeholder="Crawler Name">

<button type="submit">Create</button>

</form>

</div>

<div class="card">

<h2>Active Crawlers</h2>

{% for c in chars %}
<div class="skill">
<b>{{c.name}}</b><br>
<a href="/c/{{c.id}}">
<button>Enter Character</button>
</a>
</div>
{% endfor %}

</div>

<div class="card">

<h2>Dungeon AI Access</h2>

<a href="/dm">
<button>Enter DM Panel</button>
</a>

</div>

</div>

</body>
</html>
