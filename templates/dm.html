<!DOCTYPE html>
<html>
<head>
    <title>Dungeon AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">DUNGEON AI CONTROL PANEL</div>

<div class="main">

<div class="card">

<h2>Broadcast Message</h2>

<form action="/send_message" method="POST">

<input name="sender" placeholder="Sender Name">
<input name="target" placeholder="Target CID or all">
<input name="type" placeholder="system / npc / announcement">

<textarea name="msg" placeholder="Message"></textarea>

<button>Send</button>

</form>

</div>

<div class="card">

<h2>Apply Global Effect</h2>

<form action="/apply_effect" method="POST">

<input name="cid" placeholder="Character ID">

<input name="name" placeholder="Effect Name">
<input name="duration" placeholder="Duration (turns)">

<textarea name="payload" placeholder="Effect Text (+10 Strength, -20% speed)"></textarea>

<button>Apply Effect</button>

</form>

</div>

<div class="card">

<h2>Active Crawlers Overview</h2>

{% for c in chars %}
<div class="skill">

<b>{{c.name}}</b><br>
HP: {{c.hp}} / {{c.max_hp}}<br>
Mana: {{c.mana}} / {{c.max_mana}}

</div>
{% endfor %}

</div>

</div>

</body>
</html>
